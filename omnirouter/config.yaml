name: "OmniRoute"
description: "Free AI gateway: one endpoint, 160+ providers, smart fallback"
version: "3.7.8-1"
slug: "omnirouter"
init: false
arch:
  - amd64
  - aarch64
homeassistant: "2023.1.0"
url: "https://github.com/ad/ha-omnirouter"
ports:
  20128/tcp: 20128
  20129/tcp: null
ports_description:
  20128/tcp: "OmniRoute API + Dashboard"
  20129/tcp: "Separate dashboard port (split-port mode, optional)"
map:
  - share:rw
options:
  port: 20128
  dashboard_port: 0
schema:
  port: "port"
  dashboard_port: "int(0,65535)"
